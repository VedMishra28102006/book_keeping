<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta content="initial-scale=1.0,user-scalable=no,width=device-width" name="viewport">
		<meta content="ie=edge" http-equiv="X-UA-Compatible">
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				background-color: rgb(30, 30, 30);
				display: flex;
				font-family: sans-serif;
				margin: 0px;
				padding: 0px;
				user-select: none;
			}
			#bs,
			#journal,
			#ledger {
				display: none;
				margin: 0px;
				padding: 0px;
				width: 100%;
			}
			#fy {
				display: flex;
				flex-direction: column;
				justify-content: center;
				width: 100%;
			}
			#fy_list > li[status="closed"] > p:nth-child(2) {
				display: block;
			}
			#fy_list > li[status="open"] > p:nth-child(2) {
				display: none;
			}
			.list {
				display: flex;
				flex-direction: column;
				list-style-type: none;
				margin: 0px;
				padding: 0px;
			}
			.list > li {
				background-image: linear-gradient(to right, rgb(30, 30, 30), black);
				border-top: 1px solid grey;
				color: white;
				display: flex;
				flex-direction: row;
				font-size: large;
				position: relative;
			}
			.list > li > p {
				flex: 0;
				margin: 0;
				padding: 10px 0px;
			}
			.list > li > p:nth-child(1) {
				flex: 1;
				padding: 10px;
			}
			.list > li:first-child {
				border-top: none;
			}
			.list > li:hover {
				background-image: linear-gradient(to right, rgb(50, 50, 50), rgb(30, 30, 30));
				cursor: pointer;
			}
			.list > li > form {
				display: flex;
				flex: 1;
			}
			.list > li > form > button {
				background-image: linear-gradient(to right, pink, yellow);
				border: none;
				color: black;
				cursor: pointer;
				font-size: large;
				font-weight: bold;
				padding: 10px;
			}
			.list > li > form > input {
				background-color: transparent;
				border: none;
				color: white;
				flex: 1;
				font-size: large;
				padding: 10px;
				outline: none;
			}
			#journal_form > button[type="button"] {
				background-image: linear-gradient(to right, rgb(30, 30, 30), black);
				border: 1px solid grey;
				border-image: linear-gradient(to right, pink, yellow) 1;
				box-shadow: 0px 0px 5px black;
				color: white;
				cursor: pointer;
				left: 0px;
				position: sticky;
			}
			#ledger_account {
				display: none;
			}
			main {
				display: flex;
				justify-content: center;
				width: 100%;
			}
			.options {
				box-shadow: 0px 0px 5px black;
				display: none;
				flex-direction: column;
				list-style-type: none;
				padding: 0px;
				position: absolute;
				right: 10px;
				top: 10px;
				z-index: 1;
			}
			.options.visible {
				display: flex;
			}
			.options > li {
				background-image: linear-gradient(to right, rgb(30, 30, 30), black);
				padding: 5px 20px 5px;
				text-align: center;
			}
			.options > li:hover {
				background-image: linear-gradient(to right, rgb(50, 50, 50), rgb(30, 30, 30));
				cursor: pointer;
			}
			.options_button {
				background-color: transparent;
				border: none;
				color: white;
				cursor: pointer;
				float: right;
				font-size: large;
				font-weight: bold;
			}
			table {
				background-image: linear-gradient(to right, pink, yellow);
				border-collapse: separate;
				border-spacing: 1px;
				table-layout: fixed;
				width: 100%;
				word-wrap: break-word;
			}
			table > tbody > tr > td {
				background-color: rgb(30, 30, 30);
				border: 1px solid transparent;
				cursor: pointer;
				padding: 0px;
				position: relative;
			}
			table > tbody > tr > td > input,
			table > tbody > tr > td > p {
				background-color: transparent;
				border: none;
				color: white;
				font-size: large;
				margin: 0px;
				outline: none;
				padding: 3px;
				width: 100%;
			}
			table > tbody > tr > td > input:hover {
				background-color: rgba(255, 255, 255, 0.05);
			}
			table > tbody > tr > td > input:focus {
				background-color: rgba(255, 255, 255, 0.1);
			}
			table > tbody > tr > td > small {
				background-color: white;
				border-radius: 200px;
				bottom: 100%;
				box-shadow: 0px 0px 5px black;
				color: black;
				cursor: default;
				opacity: 0.0;
				padding: 10px 0px;
				position: absolute;
				text-align: center;
				transition: 1s linear;
				width: 100%;
				z-index: 1;
			}
			table > tbody > tr > td > small::after {
				border-color: white transparent transparent transparent;
				border-style: solid;
				border-width: 5px;
				content: "";
				left: 50%;
				margin-left: -5px;
				position: absolute;
				top: 100%;
			}
			table > thead > tr {
				background-image: linear-gradient(to right, rgb(30, 30, 30), black);
				color: white;
				font-size: large;
				overflow: hidden;
				padding: 10px;
				position: relative;
			}
			table > thead > tr > th {
				background-image: linear-gradient(to right, rgb(30, 30, 30), black);
				font-family: cursive;
				font-size: large;
				padding: 10px;
				position: relative;
			}
			table > thead > tr > th > p {
				background-clip: text;
				background-image: linear-gradient(to right, pink, yellow);
				color: transparent;
				margin: 0px;
				padding: 0px;
			}
			.table_wrapper {
				background-color: rgb(30, 30, 30);
				margin: 0px;
				padding: 0px;
				position: relative;
				width: 100%;
			}
			.toolbar {
				align-items: center;
				background-color: black;
				box-shadow: 0px 0px 5px black;
				display: flex;
				flex-direction: row;
				justify-content: start;
				overflow-x: auto;
				padding: 0px;
				width: 100%;
			}
			.toolbar > button {
				background-color: transparent;
				border: none;
				display: flex;
				flex: 1;
				flex-direction: column;
				font-size: medium;
				font-weight: bold;
				justify-content: flex-start;
				margin: 0px 5px 0px;
				padding: 15px;
			}
			.toolbar > button > i {
				background-clip: text;
				background-image: linear-gradient(to right, pink, yellow);
				color: transparent;
				font-size: 30px;
			}
			.toolbar > button > small {
				color: white;
				margin-top: 5px;
			}
			.toolbar > button:hover {
				background-color: rgba(255, 255, 255, 0.05);
				cursor: pointer;
			}
			.toolbar_wrapper {
				background-image: linear-gradient(to right, pink, yellow);
				bottom: 0px;
				margin: 0px;
				padding: 0px;
				padding-top: 3px;
				position: fixed;
				width: 100%;
			}
			.top_form {
				background-image: linear-gradient(to right, pink, yellow);
				box-shadow: 0px 0px 5px black;
				display: flex;
				flex-direction: row;
				padding: 0px;
				position: sticky;
				top: 0px;
				z-index: 1;
			}
			.top_form > button {
				background-image: linear-gradient(to right, pink, yellow);
				border: none;
				box-shadow: 0px 0px 5px black;
				cursor: pointer;
				font-size: large;
				font-weight: bold;
				padding: 10px 20px 10px;
				z-index: 1;
			}
			.top_form > .tf_wrapper {
				background-image: linear-gradient(to right, pink, yellow);
				border-left: 1px solid black;	
				border-right: 1px solid black;	
				display: flex;
				flex: 1;
				padding: 5px;
			}
			.top_form > .tf_wrapper > input {
				background-color: rgba(0, 0, 0, 0.7);
				border: none;
				caret-color: white;
				color: white;
				flex: 1;
				font-size: large;
				outline: none;
				padding: 10px;
			}
			.top_form > .tf_wrapper > input::placeholder {
				color: white;
			}
		</style>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
		<title>Accounting</title>
	</head>
	<body>
		<main>
			<div id="fy">
				<form class="top_form" id="fy_form">
					<button id="search_btn" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
					<div class="tf_wrapper">
						<input id="fy_name" name="fy_name" placeholder="search fy..." type="text">
					</div>
					<button id="add_btn" type="submit"><i class="fa-solid fa-plus"></i></button>
				</form>
				<ul class="list" id="fy_list"></ul>
				<div class="toolbar_wrapper"><div class="toolbar">
					<button onclick="
						document.cookie = 'user_token=;';
						window.location.href = '/auth';
					">
						<i class="fa-solid fa-sign-out"></i>
						<small>Sign Out</small>
					</button>
				</div></div>
			</div>
			<div id="journal">
				<form class="table_wrapper" id="journal_form">
					<table>
						<thead><tr>
							<th><p>Date</p></th>
							<th><p>A/c Debited</p></th>
							<th><p>A/c Credited</p></th>
							<th><p>Amount</p></th>
							<th><p>Description</p></th>
						</tr></thead>
						<tbody id="journal_rows"></tbody>
						<tbody id="journal_total"></tbody>
					</table>
				</form>
				<div class="toolbar_wrapper"><div class="toolbar">
					<button onclick="show_fy()">
						<i class="fa-solid fa-house"></i>
						<small>Home</small>
					</button>
					<button onclick="delete_row(event)">
						<i class="fa-solid fa-trash"></i>
						<small>Delete Row</small>
					</button>
					<button onclick="if (status == 'closed') { return; }; add_row()">
						<i class="fa-solid fa-plus"></i>
						<small>Add Row</small>
					</button>
					<button onclick="submit_journal()">
						<i class="fa-solid fa-floppy-disk"></i>
						<small>Save Book</small>
					</button>
					<button onclick="export_journal()">
						<i class="fa-solid fa-file-export"></i>
						<small>Export Book</small>
					</button>
					<button onclick="
						journal.style.display='none';
						ledger.style.display='block';
					">
						<i class="fa-solid fa-book"></i>
						<small>Ledger</small>
					</button>
				</div></div>
			</div>
			<div id="ledger">
				<div id="ledger_menu">
					<form class="top_form" id="ledger_search">
						<div class="tf_wrapper">
							<input id="ledger_q" name="ledger_q" placeholder="search account..." type="text">
						</div>
						<button type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
					</form>
					<ul class="list" id="ledger_list"></ul>
					<div class="toolbar_wrapper"><div class="toolbar">
						<button onclick="show_fy()">
							<i class="fa-solid fa-house"></i>
							<small>Home</small>
						</button>
						<button onclick="export_ledgers()">
							<i class="fa-solid fa-file-export"></i>
							<small>Export All</small>
						</button>
						<button onclick="
							ledger.style.display='none';
							journal.style.display='block';
						">
							<i class="fa-solid fa-book"></i>
							<small>Journal</small>
						</button>
						<button onclick="
							ledger.style.display='none';
							bs.style.display='block';
						">
							<i class="fa-solid fa-book"></i>
							<small>Balance Sheet</small>
						</button>
					</div></div>
				</div>
				<div id="ledger_account">
					<div class="table_wrapper" id="ledger_table">
						<table>
							<thead>
								<tr>
									<th colspan="3"><p>Dr</p></th>
									<th colspan="3"><p>Cr</p></th>
								</tr>
								<tr>
									<th><p>Date</p></th>
									<th><p>Particulars</p></th>
									<th><p>Amount</p></th>
									<th><p>Date</p></th>
									<th><p>Particulars</p></th>
									<th><p>Amount</p></th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
					<div class="toolbar_wrapper"><div class="toolbar">
						<button onclick="show_fy()">
							<i class="fa-solid fa-house"></i>
							<small>Home</small>
						</button>
						<button onclick="export_ledger()">
							<i class="fa-solid fa-file-export"></i>
							<small>Export Book</small>
						</button>
						<button onclick="
							ledger.style.display='none';
							journal.style.display='block';
						">
							<i class="fa-solid fa-book"></i>
							<small>Journal</small>
						</button>
						<button onclick="
							ledger_account.style.display='none';
							ledger_menu.style.display='block';
							ledger_table.setAttribute('account', '');
						">
							<i class="fa-solid fa-bars"></i>
							<small>Ledger Menu</small>
						</button>
						<button onclick="
							ledger.style.display='none';
							bs.style.display='block';
						">
							<i class="fa-solid fa-book"></i>
							<small>Balance Sheet</small>
						</button>
					</div></div>
				</div>
			</div>
			<div id="bs">
				<div class="table_wrapper" id="bs_table">
					<table>
						<thead>
							<tr>
								<th><p>Assets</p></th>
								<th><p>Amount</p></th>
								<th><p>Liabilities</p></th>
								<th><p>Amount</p></th>
							</tr>
						</thead>
						<tbody></tbody>
					</table>
				</div>
				<div class="toolbar_wrapper"><div class="toolbar">
					<button onclick="show_fy()">
						<i class="fa-solid fa-house"></i>
						<small>Home</small>
					</button>
					<button onclick="export_bs()">
						<i class="fa-solid fa-file-export"></i>
						<small>Export Book</small>
					</button>
					<button onclick="
						bs.style.display='none';
						ledger.style.display='block';
					">
						<i class="fa-solid fa-arrow-left"></i>
						<small>Back</small>
					</button>
				</div></div>
			</div>
		</main>
		<script>
			let user_status = null;
			fetch("/status", {method: "GET"})
			.then(response => response.json())
			.then(data => {
				user_status = data.status;
				if (data.admin) document.getElementById("fy").querySelector(".toolbar").insertAdjacentHTML("beforeend", `
					<button onclick="window.location.href = '/admin';">
						<i class="fa-solid fa-user-shield"></i>
						<small>Admin Page</small>
					</button>
				`);
			})
			.catch(error => { alert(error); });
			let fy_form = document.getElementById("fy_form");
			let fy_list = document.getElementById("fy_list");
			let fy_item = (row) => {
				return `<li id="${row.id}" onclick="
						fy.style.display = 'none';
						journal.style.display = 'block';
						journal_form.setAttribute('fy_id', '${row.id}');
						fetch_journal('${row.id}');
						fetch_ledger_menu();
						fetch_bs();
					" status="${row.status}">
					<p>${row.name}</p>
					<p>(closed)</p>
					<button class="options_button" onclick="event.stopPropagation();showOptions('${row.id}');">&vellip;</button>
					<ul class="options" id="options${row.id}">
						<li onclick="
							event.stopPropagation();
							fy.style.display = 'none';
							journal.style.display = 'block';
							journal_form.setAttribute('fy_id', '${row.id}');
							fetch_journal('${row.id}');
							fetch_ledger_menu();
							fetch_bs();
						">view</li>
						<li onclick="event.stopPropagation();edit_fy('${row.id}')">edit</li>
						<li onclick="event.stopPropagation();delete_fy('${row.id}')">delete</li>
						<li onclick="event.stopPropagation();toggle_fy(this, '${row.id}')">${(row.status == "closed") ? "open" : "close"}</li>
					</ul>
				</li>`;
			};
			let errorVisible = null;
			let focused = null;
			let showOptions = (id) => {
				let options = document.getElementsByClassName("options");
				for (option of options) {
					if (option.classList.contains("visible")) {
						option.classList.remove("visible");
					}
				}
				document.getElementById(`options${id}`).classList.add("visible");
			};
			document.addEventListener("click", (event) => {
				let options = document.getElementsByClassName("visible");
				if (options) {
					for (option of options) {
						option.classList.remove("visible");
					}
				}
				if (errorVisible) {
					for (e of errorVisible) {
						let field = journal_form.querySelectorAll(`input[name="${e.field}"]`)[e.index];
						field.previousElementSibling.style.opacity = "0.0";
							setTimeout(() => {
								field.previousElementSibling.innerText = "";
							}, 1000);
					}
					errorVisible = null;
				}
				if (focused && event.target.tagName.toLowerCase() != "input") {
					focused = null;
				}
			});
			let insearch = false;
			fy_form.addEventListener("submit", (event) => {
				event.preventDefault();
				if (user_status == "locked") {
					alert("Your account has been locked");
					return;
				}
				let data = new FormData(fy_form);
				if (event.submitter.id == "add_btn") {
					fetch("/fy", {
						method: "POST",
						body: data
					}).then(response => response.json())
					.then(data => {
						if (data.error && data.id) {
							if (data.id == -1) {
								alert(data.error);
								return;
							}
							let fy = document.getElementById(`${data.id}`);
							let temp_func = () => {
								if (!fy) { fy = document.getElementById(`${data.id}`); }
								fy.scrollIntoView({
									behavior: "smooth",
									block: "center"
								});
								fy.style.backgroundImage = "linear-gradient(to right, rgb(50, 50, 50), rgb(30, 30, 30))";
								setTimeout(() => {
									fy.style.backgroundImage = "linear-gradient(to right, rgb(30, 30, 30), black)";
								}, 500);
							};
							if (!fy) {
								fetch_fy().then(temp_func);
								insearch = false;
							} else {
								temp_func();
							}
						} else if (data.success) {
							let temp_func = () => {
								fy_form.querySelector("input").value = "";
								if (!insearch) {
									fy_list.insertAdjacentHTML("beforeend", fy_item(data.row));
								}
								fy_list.children[fy_list.children.length-1].scrollIntoView({
									behavior: "smooth",
									block: "center"
								});
								fy_list.children[fy_list.children.length-1].style.backgroundImage = "linear-gradient(to right, rgb(50, 50, 50), rgb(30, 30, 30))";
								setTimeout(() => {
									fy_list.children[fy_list.children.length-1].style.backgroundImage = "linear-gradient(to right, rgb(30, 30, 30), black)";
								}, 500);
							};
							if (insearch) {
								fetch_fy().then(() =>{
									insearch = true;
									temp_func();
								});
							} else {
								temp_func();
							}
						}
					})
					.catch(error => {alert(error);});
				}
				if (event.submitter.id == "search_btn") {
					if (!insearch) { insearch = true; }
					fetch_fy(data.get("fy_name"));
				}
			});
			let fetch_fy = (fy_q=null) => {
				return new Promise((resolve, reject) => {
					fy_list.innerHTML = "";
					fetch(`/fy${(fy_q) ? `?fy_q=${fy_q}` : ""}`, {method: "GET"})
					.then(response => response.json())
					.then(data => {
						for (row of data) {
							fy_list.insertAdjacentHTML("beforeend", fy_item(row));
						}
						resolve(data);
					})
					.catch(error => {
						reject(error);
					});
				});
			};
			fetch_fy();
			let edit_fy = (id) => {
				document.getElementById(`options${id}`).classList.remove("visible");
				if (user_status == "locked") {
					alert("Your account has been locked");
					return;
				}
				let fy = document.getElementById(`${id}`);
				fy.innerHTML = `
					<form onsubmit="event.preventDefault();update_fy('${id}')">
						<input id="input${id}" type="text" value="${fy.children[0].innerText}">
						<button type="submit">ok</button>
					</form>
				`;
				fy.onclick = null;
				document.getElementById(`input${id}`).focus();
			};
			let update_fy = (id) => {
				if (user_status == "locked") {
					alert("Your account has been locked");
					return;
				}
				let fy_name = document.getElementById(`input${id}`).value;
				let data = new FormData();
				data.append("id", id);
				data.append("fy_name", fy_name);
				data.append("purpose", "update_text");
				fetch("/fy", {
					method: "PATCH",
					body: data
				})
				.then(response => response.json())
				.then(data => {
					if (data.error && data.id) {
						if (data.id == -1) {
							alert(data.error);
							return;
						}
						let fy = document.getElementById(`${data.id}`);
						let temp_func = () => {
							if (!fy) { fy = document.getElementById(`${data.id}`); }
							fy.scrollIntoView({
								behavior: "smooth",
								block: "center"
							});

					return;
				}
				let data = new FormData();
				data.append("type", type);
				data.append("subtype", subtype);
				data.append("operation", operation);
				data.append("account", account);
				fetch(`/bs/${journal_form.getAttribute("fy_id")}`, {
					method: "PATCH",
					body: data
				})
				.then(response => response.json())
				.then(data => {
					if (data.error) {
						alert(data.error);
					} else if (data.success) {
						target.querySelector(".operation").innerHTML = (data.type != "nota") ? `(${(data.operation == "add") ? "+" : "-"})` : ``;
						target.querySelector(".type").innerHTML = (data.type != "nota") ? `(${data.type})` : ``;
						target.querySelector(".subtype").innerHTML = (data.type != "nota") ? `(${data.subtype})` : ``;
						fetch_bs();
					}
				})
				.catch(error => {alert(error);});
			};
			let bs = document.getElementById("bs");
			let bs_table = document.getElementById("bs_table");
			let fetch_bs = () => {
				bs_table.querySelector("tbody").innerHTML = "";
				fetch(`/bs/${journal_form.getAttribute("fy_id")}`, {method: "GET"})
				.then(response => response.json())
				.then(data => {
					if (data.error) {
						alert(data.error);
					} else {
						let tbody = bs_table.querySelector("tbody");
						tbody.insertAdjacentHTML("beforeend", `<tr>
							<td colspan="2"><p>Current Assets:</p></td>
							<td colspan="2"><p>Current Liabilities:</p></td>
						</tr>`);
						let empty_row = "<tr>"+"<td><p></p></td>".repeat(4)+"</tr>";
						for (let i=0; i < Math.max(data.assets.current.length, data.liabilities.current.length); i++) {
							tbody.insertAdjacentHTML("beforeend", `<tr>
								<td onclick="${data.assets.current[i] ? `refer_ledger('${data.assets.current[i].account}')` : ""}"><p>${data.assets.current[i] ? data.assets.current[i].account : ""}</p></td>
								<td onclick="${data.assets.current[i] ? `refer_ledger('${data.assets.current[i].account}')` : ""}"><p>${data.assets.current[i] ? ((data.assets.current[i].operation == "add") ? data.assets.current[i].amount : `(${data.assets.current[i].amount})`) : ""}</p></td>
								<td onclick="${data.liabilities.current[i] ? `refer_ledger('${data.liabilities.current[i].account}')` : ""}"><p>${data.liabilities.current[i] ? data.liabilities.current[i].account : ""}</p></td>
								<td onclick="${data.liabilities.current[i] ? `refer_ledger('${data.liabilities.current[i].account}')` : ""}"><p>${data.liabilities.current[i] ? ((data.liabilities.current[i].operation == "add") ? data.liabilities.current[i].amount : `(${data.liabilities.current[i].amount})`): ""}</p></td>
							</tr>`);
						}
						tbody.insertAdjacentHTML("beforeend", empty_row+`<tr>
							<td><p>Total current assets</p></td>
							<td><p>${data.assets.current_total}</p></td>
							<td><p>Total current liabilities</p></td>
							<td><p>${data.liabilities.current_total}</p></td>
						</tr>`+empty_row);
						tbody.insertAdjacentHTML("beforeend", `<tr>
							<td colspan="2"><p>Non-Current Assets:</p></td>
							<td colspan="2"><p>Non-Current Liabilities:</p></td>
						</tr>`);
						for (let i=0; i < Math.max(data.assets.noncurrent.length, data.liabilities.noncurrent.length); i++) {
							tbody.insertAdjacentHTML("beforeend", `<tr>
								<td onclick="${data.assets.noncurrent[i] ? `refer_ledger('${data.assets.noncurrent[i].account}')` : ""}"><p>${data.assets.noncurrent[i] ? data.assets.noncurrent[i].account : ""}</p></td>
								<td onclick="${data.assets.noncurrent[i] ? `refer_ledger('${data.assets.noncurrent[i].account}')` : ""}"><p>${data.assets.noncurrent[i] ? ((data.assets.noncurrent[i].operation == "add") ? data.assets.noncurrent[i].amount : `(${data.assets.noncurrent[i].amount})`) : ""}</p></td>
								<td onclick="${data.liabilities.noncurrent[i] ? `refer_ledger('${data.liabilities.noncurrent[i].account}')` : ""}"><p>${data.liabilities.noncurrent[i] ? data.liabilities.noncurrent[i].account : ""}</p></td>
								<td onclick="${data.liabilities.noncurrent[i] ? `refer_ledger('${data.liabilities.noncurrent[i].account}')` : ""}"><p>${data.liabilities.noncurrent[i] ? ((data.liabilities.noncurrent[i].operation == "add") ? data.liabilities.noncurrent[i].amount : `(${data.liabilities.noncurrent[i].amount})`) : ""}</p></td>
							</tr>`);
						}
						tbody.insertAdjacentHTML("beforeend", empty_row+`<tr>
							<td><p>Total non-current assets</p></td>
							<td><p>${data.assets.noncurrent_total}</p></td>
							<td><p>Total non-current liabilities</p></td>
							<td><p>${data.liabilities.noncurrent_total}</p></td>
						</tr>`+empty_row);
						tbody.insertAdjacentHTML("beforeend", `<tr>
							<td colspan="2"><p></p></td>
							<td colspan="2"><p>Shareholders' Equity:</p></td>
						</tr>`);
						for (let i=0; i < data.liabilities.equity.length; i++) {
							tbody.insertAdjacentHTML("beforeend", `<tr>
								<td colspan="2"><p></p></td>
								<td onclick="${data.liabilities.equity[i] ? `refer_ledger('${data.liabilities.equity[i].account}')` : ""}"><p>${data.liabilities.equity[i] ? data.liabilities.equity[i].account : ""}</p></td>
								<td onclick="${data.liabilities.equity[i] ? `refer_ledger('${data.liabilities.equity[i].account}')` : ""}"><p>${data.liabilities.equity[i] ? ((data.liabilities.equity[i].operation == "add") ? data.liabilities.equity[i].amount : `(${data.liabilities.equity[i].amount})`) : ""}</p></td>
							</tr>`);
						}
						tbody.insertAdjacentHTML("beforeend", empty_row+`<tr>
							<td colspan="2"><p></p></td>
							<td><p>Total shareholders' equity</p></td>
							<td><p>${data.liabilities.equity_total}</p></td>
						</tr>`+empty_row);
						tbody.insertAdjacentHTML("beforeend", `<tr>
							<td><p>Total assets</p></td>
							<td><p>${data.assets.total}</p></td>
							<td><p>Total liabilities</p></td>
							<td><p>${data.liabilities.total}</p></td>
						</tr>`);
					}
				})
				.catch(error => {alert(error);});
			};
			let export_bs = async () => {
				if (!bs_table.querySelector("tbody").children.length) {
					return;
				}
				await fetch(`/bs/${journal_form.getAttribute("fy_id")}`, {method: "GET"})
				.then(response => response.json())
				.then(data => {
					if (data.error) {
						alert(data.error);
					} else {
						let csv = "Assets,Amount,Liabilities,Amount\r\n";
						csv += "Current Assets:,,Current Liabilities:,\r\n";
						for (let i=0; i < Math.max(data.assets.current.length, data.liabilities.current.length); i++) {
							csv += `${(data.assets.current[i]) ? data.assets.current[i].account : ""},${(data.assets.current[i]) ? ((data.assets.current[i].operation == "add") ? data.assets.current[i].amount : `(${data.assets.current[i].amount})`) : ""},${(data.liabilities.current[i]) ? data.liabilities.current[i].account : ""},${(data.liabilities.current[i]) ? ((data.liabilities.current[i].operation == "add") ? data.liabilities.current[i].amount : `(${data.liabilities.current[i].amount})`) : ""}\r\n`;
						}
						alert(csv);
						csv += `\r\nTotal current assets,${data.assets.current_total},Total current liabilities,${data.liabilities.current_total}\r\n`;
						csv += "\r\nNon-Current Assets:,,Non-Current Liabilities:,\r\n";
						for (let i=0; i < Math.max(data.assets.noncurrent.length, data.liabilities.noncurrent.length); i++) {
							csv += `${(data.assets.noncurrent[i]) ? data.assets.noncurrent[i].account : ""},${(data.assets.noncurrent[i]) ? ((data.assets.noncurrent[i].operation == "add") ? data.assets.noncurrent[i].amount : `(${data.assets.noncurrent[i].amount})`) : ""},${(data.liabilities.noncurrent[i]) ? data.liabilities.noncurrent[i].account : ""},${(data.liabilities.noncurrent[i]) ? ((data.liabilities.noncurrent[i].operation == "add") ? data.liabilities.noncurrent[i].amount : `(${data.liabilities.noncurrent[i].amount})`) : ""}\r\n`;
						}
						csv += `\r\nTotal non-current assets,${data.assets.noncurrent_total},Total non-current liabilities,${data.liabilities.noncurrent_total}\r\n`;
						csv += "\r\n,,Shareholders' Equity:,\r\n";
						for (let i=0; i < data.liabilities.equity.length; i++) {
							csv += `,,${(data.liabilities.equity[i]) ? data.liabilities.equity[i].account : ""},${(data.liabilities.equity[i]) ? ((data.liabilities.equity[i].operation == "add") ? data.liabilities.equity[i].amount : `(${data.liabilities.equity[i].amount})`) : ""}\r\n`;
						}
						csv += `\r\n,,Total shareholders' equity,${data.liabilities.equity_total}\r\n`;
						csv += `\r\nTotal assets,${data.assets.total},Total liabilities,${data.liabilities.total}`;
						let blob = new Blob([csv], {type: "text/csv"});
						let url = URL.createObjectURL(blob);
						let a = document.createElement('a');
						a.href = url;
						a.download = `${journal_form.getAttribute("fy_name")}_bs`;
						document.body.appendChild(a);
						a.click();
						document.body.removeChild(a);
						URL.revokeObjectURL(url);
					}
				})
				.catch(error => {alert(error);});
			};
			let refer_ledger = (account) => {
				bs.style.display = "none";
				ledger.style.display = "block";
				ledger_menu.style.display = "none";
				ledger_account.style.display = "block";
				fetch_ledger_account(account);
			};
		</script>
	</body>
</html>
